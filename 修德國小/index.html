// basic variables and DOM refs
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var modeSelect = document.getElementById('mode');
var showLabels = document.getElementById('showLabels');
var showArrows = document.getElementById('showArrows');
var hoverFocus = document.getElementById('hoverFocus');
var exportBtn = document.getElementById('export');
var tooltip = document.getElementById('tooltip');

var nodes = GRAPH_DATA.nodes.slice(0);
var edges = GRAPH_DATA.edges.slice(0);
var nodeById = {};
for (var i=0;i<nodes.length;i++){ nodeById[nodes[i].id]=nodes[i]; }

// initial positions: use parallel coords
for (var i=0;i<nodes.length;i++){
  nodes[i].x = nodes[i].parallelX;
  nodes[i].y = nodes[i].parallelY;
}

// camera and interaction
var width=window.innerWidth, height=window.innerHeight, dpr = window.devicePixelRatio || 1;
var camera = {x:0,y:0,scale:1};
var isPanning=false, isDragging=false, dragNode=null;
var lastMouse = {x:0,y:0};
var hovered = null;

function resize(){ width = canvas.clientWidth; height = canvas.clientHeight; canvas.width = Math.round(width*dpr); canvas.height = Math.round(height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); fit(); }
function worldToScreen(x,y){ return {x: width/2 + (x+camera.x)*camera.scale, y: height/2 + (y+camera.y)*camera.scale}; }
function screenToWorld(x,y){ return {x: (x-width/2)/camera.scale - camera.x, y: (y-height/2)/camera.scale - camera.y}; }

function drawArrow(sx,sy,tx,ty,color,widthLine,drawHead){
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.globalAlpha = 1; ctx.lineWidth = widthLine;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(tx,ty); ctx.stroke();
  if(drawHead){
    var angle = Math.atan2(ty-sy, tx-sx);
    var head = Math.max(8, 6 + widthLine*2);
    ctx.beginPath();
    ctx.moveTo(tx,ty);
    ctx.lineTo(tx - head*Math.cos(angle - Math.PI/7), ty - head*Math.sin(angle - Math.PI/7));
    ctx.lineTo(tx - head*Math.cos(angle + Math.PI/7), ty - head*Math.sin(angle + Math.PI/7));
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function nodeScreenPos(n){
  return worldToScreen(n.x, n.y);
}

function draw(){
  ctx.clearRect(0,0,width,height);
  // draw edges
  for(var i=0;i<edges.length;i++){
    var e = edges[i];
    var s = nodeById[e.source];
    var t = nodeById[e.target];
    if(!s || !t) continue;
    var sp = nodeScreenPos(s);
    var tp = nodeScreenPos(t);
    // shift start/end by node radius
    var dx = tp.x - sp.x, dy = tp.y - sp.y;
    var dist = Math.sqrt(dx*dx+dy*dy) || 1;
    var ux = dx/dist, uy = dy/dist;
    var sr = Math.max(4, s.size) * camera.scale;
    var tr = Math.max(4, t.size) * camera.scale;
    var sx = sp.x + ux*(sr+2), sy = sp.y + uy*(sr+2);
    var ex = tp.x - ux*(tr+10), ey = tp.y - uy*(tr+10);
    var col = e.color || '#cccccc';
    var lw = e.size || 1.2;
    drawArrow(sx,sy,ex,ey,col,lw, showArrows.checked);
  }
  // draw nodes
  for(var i=0;i<nodes.length;i++){
    var n = nodes[i];
    var p = nodeScreenPos(n);
    var s = Math.max(4, n.size);
    ctx.save();
    // dim if hoverFocus active and not neighbor
    var alpha = 1.0;
    if(hovered && hoverFocus.checked){
      var isNeighbor = (hovered.id === n.id);
      for(var j=0;j<edges.length && !isNeighbor;j++){
        if(edges[j].source===hovered.id && edges[j].target===n.id) { isNeighbor=true; break; }
        if(edges[j].target===hovered.id && edges[j].source===n.id) { isNeighbor=true; break; }
      }
      if(!isNeighbor) alpha = 0.25;
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = n.color || (n.type==='member' ? '#baceb1' : '#c3b4d1');
    ctx.strokeStyle = '#666'; ctx.lineWidth=1;
    if(n.shape==='circle'){ ctx.beginPath(); ctx.arc(p.x,p.y,s,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
    else { ctx.beginPath(); ctx.rect(p.x-s,p.y-s,s*2,s*2); ctx.fill(); ctx.stroke(); }
    ctx.restore();
  }
  // labels
  if(showLabels.checked){
    ctx.save(); ctx.font = '12px Arial, Noto Sans TC'; ctx.fillStyle='#222';
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i]; var p = nodeScreenPos(n); var s = Math.max(4, n.size); var gap = s + 6;
      var text = n.label;
      var metrics = ctx.measureText(text); var tw = metrics.width; var x,y;
      if(modeSelect.value === 'parallel'){
        if(n.type === 'member'){ x = p.x - (tw + gap); y = p.y - 8; }
        else { x = p.x + gap; y = p.y - 8; }
      } else {
        // arc mode: both labels left of node per your request
        x = p.x - (tw + gap); y = p.y - 8;
      }
      if(hovered && hoverFocus.checked){
        var isNeighbor = (hovered.id === n.id);
        for(var j=0;j<edges.length && !isNeighbor;j++){
          if(edges[j].source===hovered.id && edges[j].target===n.id) { isNeighbor=true; break; }
          if(edges[j].target===hovered.id && edges[j].source===n.id) { isNeighbor=true; break; }
        }
        if(!isNeighbor) ctx.globalAlpha = 0.25;
      }
      ctx.fillText(text, x+3, y+1);
      ctx.globalAlpha = 1.0;
    }
    ctx.restore();
  }
}

// basic fit layout: center and scale
function fit(){
  var xs = [], ys = [];
  for(var i=0;i<nodes.length;i++){ xs.push(nodes[i].x); ys.push(nodes[i].y); }
  if(xs.length===0){ camera = {x:0,y:0,scale:1}; draw(); return; }
  var minX = Math.min.apply(null, xs), maxX = Math.max.apply(null, xs);
  var minY = Math.min.apply(null, ys), maxY = Math.max.apply(null, ys);
  var pad = 200;
  var graphW = Math.max(1, maxX-minX+pad), graphH = Math.max(1, maxY-minY+pad);
  var scaleX = width / graphW, scaleY = height / graphH;
  camera.scale = Math.min(scaleX, scaleY) * 0.95;
  camera.x = -((minX+maxX)/2);
  camera.y = -((minY+maxY)/2);
  draw();
}

// apply layouts
function applyLayout(mode){
  if(mode === 'parallel'){
    for(var i=0;i<nodes.length;i++){
      nodes[i].x = nodes[i].parallelX;
      nodes[i].y = nodes[i].parallelY;
    }
  } else {
    for(var i=0;i<nodes.length;i++){
      nodes[i].x = nodes[i].arcX;
      nodes[i].y = nodes[i].arcY;
    }
  }
  fit();
}

// simple hit test
function findNodeAt(mx,my){
  for(var i=nodes.length-1;i>=0;i--){
    var n = nodes[i];
    var p = nodeScreenPos(n);
    var r = Math.max(4, n.size) * camera.scale;
    if(n.shape === 'circle'){
      var dx = mx - p.x, dy = my - p.y;
      if(dx*dx + dy*dy <= r*r) return n;
    } else {
      if(mx >= p.x - r && mx <= p.x + r && my >= p.y - r && my <= p.y + r) return n;
    }
  }
  return null;
}

// events
canvas.addEventListener('mousedown', function(e){
  var rect = canvas.getBoundingClientRect(); var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var n = findNodeAt(mx,my);
  lastMouse.x = e.clientX; lastMouse.y = e.clientY;
  if(n){ isDragging=true; dragNode = n; canvas.style.cursor='grabbing'; }
  else { isPanning = true; canvas.style.cursor='grabbing'; }
});
window.addEventListener('mousemove', function(e){
  var rect = canvas.getBoundingClientRect(); var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if(isDragging && dragNode){
    var w = screenToWorld(mx,my); dragNode.x = w.x; dragNode.y = w.y; draw(); updateTooltipPosition(mx,my); return;
  }
  if(isPanning){
    var dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
    camera.x += dx / camera.scale; camera.y += dy / camera.scale;
    lastMouse.x = e.clientX; lastMouse.y = e.clientY;
    draw(); return;
  }
  var n = findNodeAt(mx,my);
  if(n){
    if(hovered === null || hovered.id !== n.id) hovered = n;
    showTooltipForNode(n, mx, my);
    draw();
  } else {
    hovered = null; tooltip.style.display='none'; draw();
  }
});
window.addEventListener('mouseup', function(){ isPanning=false; isDragging=false; dragNode=null; canvas.style.cursor='grab'; });
canvas.addEventListener('wheel', function(e){ e.preventDefault(); var rect = canvas.getBoundingClientRect(); var mx = e.clientX - rect.left, my = e.clientY - rect.top; var before = screenToWorld(mx,my); var factor = e.deltaY < 0 ? 1.1 : 0.9; camera.scale = Math.max(0.12, Math.min(6, camera.scale * factor)); var after = screenToWorld(mx,my); camera.x += after.x - before.x; camera.y += after.y - before.y; draw(); }, {passive:false});

function showTooltipForNode(n, mx, my){
  var items = [];
  if(n.type === 'member'){
    for(var i=0;i<edges.length;i++){ if(edges[i].source === n.id){ items.push(nodeById[edges[i].target].label); } }
  } else {
    for(var i=0;i<edges.length;i++){ if(edges[i].target === n.id){ items.push(nodeById[edges[i].source].label); } }
  }
  var html = '<div style="font-weight:700;margin-bottom:6px">' + escapeHtml(n.label) + '</div>';
  html += '<div style="color:#555;margin-bottom:6px">' + (n.type==='member' ? '學校成員' : '機構') + '</div>';
  html += '<div><strong>連結數：' + items.length + '</strong></div>';
  if(items.length > 0){ html += '<ul style="margin:6px 0 0 18px;padding:0;">'; for(var j=0;j<items.length;j++){ html += '<li>' + escapeHtml(items[j]) + '</li>'; } html += '</ul>'; }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  updateTooltipPosition(mx,my);
}
function updateTooltipPosition(mx,my){
  tooltip.style.left = Math.min(mx+12, width-320) + 'px';
  tooltip.style.top = Math.min(my+12, height-200) + 'px';
}
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

modeSelect.addEventListener('change', function(){ applyLayout(modeSelect.value); });
showLabels.addEventListener('change', draw);
showArrows.addEventListener('change', draw);
hoverFocus.addEventListener('change', draw);
exportBtn.addEventListener('click', function(){ var link = document.createElement('a'); link.href = canvas.toDataURL('image/png'); link.download = 'network.png'; link.click(); });

window.addEventListener('resize', resize);

// initial
resize();
applyLayout('parallel');

</script>
</body>
