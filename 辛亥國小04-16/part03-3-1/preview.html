<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辛亥國小｜校內網絡_課程與教學</title>
<style>
  :root{
    --bg:#f5efe8;
    --panel:#fbf8f4;
    --panel-2:#f0e8e1;
    --line:#d8cdc3;
    --text:#4e443d;
    --muted:#7a6f67;
    --teacher:#7d90a3;
    --admin:#b9817c;
    --edge:#aa9c91;
    --edge-fade:rgba(170,156,145,.18);
    --shadow:0 18px 40px rgba(78,68,61,.12);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:linear-gradient(180deg,#f5efe8 0%,#efe6de 100%);
    color:var(--text);
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  }
  .app{
    height:100%;
    display:grid;
    grid-template-rows:auto auto 1fr;
    gap:14px;
    padding:16px;
  }
  .topbar,.controls,.stage{
    background:rgba(251,248,244,.92);
    border:1px solid rgba(184,159,138,.2);
    border-radius:22px;
    box-shadow:var(--shadow);
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    padding:18px 22px;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    color:var(--muted);
  }
  h1{
    margin:0;
    font-size:28px;
    line-height:1.2;
  }
  .sub{
    font-size:13px;
    color:var(--muted);
  }
  .controls{
    padding:14px 18px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:14px 18px;
  }
  .control-group{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px 14px;
  }
  label,select,button{
    font:inherit;
  }
  select,button{
    border:none;
    border-radius:999px;
    background:var(--panel-2);
    color:var(--text);
    padding:10px 14px;
    cursor:pointer;
  }
  select{
    padding-right:36px;
  }
  .check{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:999px;
    background:var(--panel-2);
  }
  .check input{accent-color:var(--text)}
  .stage{
    position:relative;
    overflow:hidden;
    min-height:0;
  }
  #canvas{
    width:100%;
    height:100%;
    display:block;
    cursor:grab;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 32%),
      linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.08));
  }
  #canvas.dragging{cursor:grabbing}
  .legend{
    position:absolute;
    left:18px;
    bottom:18px;
    background:rgba(251,248,244,.96);
    border:1px solid rgba(184,159,138,.2);
    border-radius:18px;
    box-shadow:0 14px 30px rgba(78,68,61,.12);
    padding:14px 16px;
    min-width:180px;
    backdrop-filter:blur(10px);
  }
  .legend-title{
    font-size:14px;
    font-weight:800;
    margin-bottom:10px;
  }
  .legend-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--text);
  }
  .legend-row + .legend-row{margin-top:8px}
  .legend-dot{
    width:14px;
    height:14px;
    border-radius:50%;
    flex:0 0 14px;
  }
  .legend-dot.teacher{background:var(--teacher)}
  .legend-dot.admin{background:var(--admin)}
  .legend-arrow{
    position:relative;
    width:26px;
    height:12px;
    flex:0 0 26px;
  }
  .legend-arrow::before{
    content:"";
    position:absolute;
    left:0;
    right:7px;
    top:50%;
    height:2px;
    transform:translateY(-50%);
    background:var(--edge);
    border-radius:999px;
  }
  .legend-arrow::after{
    content:"";
    position:absolute;
    right:0;
    top:50%;
    width:0;height:0;
    transform:translateY(-50%);
    border-top:5px solid transparent;
    border-bottom:5px solid transparent;
    border-left:7px solid var(--edge);
  }
  .status{
    position:absolute;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(78,68,61,.82);
    color:#fff;
    padding:10px 14px;
    border-radius:999px;
    font-size:13px;
    box-shadow:0 10px 24px rgba(0,0,0,.18);
    pointer-events:none;
  }
  .tooltip{
    position:absolute;
    display:none;
    min-width:220px;
    max-width:300px;
    background:rgba(251,248,244,.98);
    border:1px solid rgba(184,159,138,.22);
    border-radius:18px;
    box-shadow:0 18px 40px rgba(78,68,61,.16);
    padding:14px 16px;
    z-index:5;
    backdrop-filter:blur(10px);
  }
  .tooltip .title{
    font-size:16px;
    font-weight:800;
    margin-bottom:6px;
  }
  .tooltip .meta{
    font-size:12px;
    color:var(--muted);
    margin-bottom:8px;
  }
  .tooltip .list{
    margin-top:8px;
    max-height:180px;
    overflow:auto;
    padding-right:4px;
  }
  .tooltip ul{
    margin:6px 0 0 18px;
    padding:0;
  }
  .tooltip li{margin:0 0 4px 0}
  .corner-note{
    position:absolute;
    right:18px;
    bottom:18px;
    background:rgba(251,248,244,.94);
    border:1px solid rgba(184,159,138,.2);
    color:var(--muted);
    border-radius:999px;
    padding:9px 12px;
    font-size:12px;
  }
  @media (max-width: 900px){
    .app{padding:12px}
    h1{font-size:22px}
    .controls{padding:12px 14px}
    .legend{left:12px;bottom:12px}
    .corner-note{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="eyebrow">LIFT學習生態系統｜一模網絡圖</div>
      <h1>辛亥國小｜校內網絡_課程與教學</h1>
      <div class="sub">資料來源：network2.gexf｜教師身分／行政身分｜節點大小依Indegree</div>
    </div>
  </header>

  <section class="controls">
    <div class="control-group">
      <label for="layoutMode">布局：</label>
      <select id="layoutMode" aria-label="布局模式">
        <option value="parallel">左右並列</option>
        <option value="circle">環狀並列</option>
        <option value="fr">Fruchterman–Reingold</option>
        <option value="kk">Kamada–Kawai</option>
      </select>
      <button id="rerunBtn" type="button">重新布局</button>
      <button id="resetViewBtn" type="button">重設視圖</button>
    </div>
    <div class="control-group">
      <label class="check"><input id="toggleLabels" type="checkbox" checked>顯示ID</label>
      <label class="check"><input id="toggleArrows" type="checkbox" checked>顯示箭頭</label>
      <label class="check"><input id="toggleFocus" type="checkbox" checked>Hover聚焦</label>
    </div>
  </section>

  <section class="stage">
    <canvas id="canvas"></canvas>
    <div id="status" class="status">正在載入network2.gexf…</div>
    <div id="tooltip" class="tooltip"></div>

    <div class="legend" aria-label="圖例">
      <div class="legend-title">圖例</div>
      <div class="legend-row"><span class="legend-dot teacher"></span><span>教師身分</span></div>
      <div class="legend-row"><span class="legend-dot admin"></span><span>行政身分</span></div>
      <div class="legend-row"><span class="legend-arrow"></span><span>有向連結</span></div>
    </div>

    <div class="corner-note">拖曳空白處可平移，滾輪可縮放，拖曳節點可微調位置</div>
  </section>
</div>

<script>
(function () {
  const GEXF_FILE = './network2.gexf';
  const COLORS = {
    teacher: '#7d90a3',
    admin: '#b9817c',
    edge: '#aa9c91',
    edgeFade: 'rgba(170,156,145,.18)',
    nodeStroke: 'rgba(255,255,255,.88)',
    label: '#4e443d'
  };

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  const statusBox = document.getElementById('status');
  const layoutMode = document.getElementById('layoutMode');
  const rerunBtn = document.getElementById('rerunBtn');
  const resetViewBtn = document.getElementById('resetViewBtn');
  const toggleLabels = document.getElementById('toggleLabels');
  const toggleArrows = document.getElementById('toggleArrows');
  const toggleFocus = document.getElementById('toggleFocus');

  let graph = { nodes: [], edges: [] };
  let nodeMap = new Map();
  let adjacency = new Map();
  let hoverNode = null;
  let dragNode = null;
  let isPanning = false;
  let lastMouse = { x: 0, y: 0 };
  let camera = { x: 0, y: 0, scale: 1 };
  let worldBounds = { minX: -500, maxX: 500, minY: -400, maxY: 400 };

  function setStatus(msg, persist) {
    statusBox.innerHTML = msg;
    statusBox.style.display = 'block';
    if (!persist) {
      clearTimeout(setStatus._timer);
      setStatus._timer = setTimeout(() => {
        statusBox.style.display = 'none';
      }, 1700);
    }
  }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  function worldToScreen(x, y) {
    return {
      x: canvas.clientWidth / 2 + (x - camera.x) * camera.scale,
      y: canvas.clientHeight / 2 + (y - camera.y) * camera.scale
    };
  }

  function screenToWorld(x, y) {
    return {
      x: camera.x + (x - canvas.clientWidth / 2) / camera.scale,
      y: camera.y + (y - canvas.clientHeight / 2) / camera.scale
    };
  }

  function resetView(paddingFactor) {
    paddingFactor = paddingFactor || 0.84;
    const width = canvas.clientWidth || 1000;
    const height = canvas.clientHeight || 700;
    const w = Math.max(1, worldBounds.maxX - worldBounds.minX);
    const h = Math.max(1, worldBounds.maxY - worldBounds.minY);
    camera.x = (worldBounds.minX + worldBounds.maxX) / 2;
    camera.y = (worldBounds.minY + worldBounds.maxY) / 2;
    camera.scale = Math.min(width / w, height / h) * paddingFactor;
    draw();
  }

  function parseGexf(xmlText) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, 'application/xml');
    const parseErr = xml.querySelector('parsererror');
    if (parseErr) throw new Error('GEXF XML格式錯誤');

    const attrDefs = {};
    xml.querySelectorAll('graph > attributes[class="node"] > attribute').forEach(attr => {
      attrDefs[attr.getAttribute('id')] = attr.getAttribute('title');
    });

    const nodes = [];
    xml.querySelectorAll('graph > nodes > node').forEach(nodeEl => {
      const attrs = {};
      nodeEl.querySelectorAll('attvalue').forEach(av => {
        const key = av.getAttribute('for');
        attrs[key] = av.getAttribute('value');
      });

      const titleMap = {};
      Object.keys(attrs).forEach(k => {
        titleMap[attrDefs[k] || k] = attrs[k];
      });

      const posEl = nodeEl.querySelector('position, viz\\:position');
      const colorEl = nodeEl.querySelector('color, viz\\:color');

      const adminValue = String(
        titleMap['行政團隊'] ?? attrs['admin_attr'] ?? attrs['行政團隊'] ?? '0'
      ).trim();

      const role = String(
        titleMap['身分別'] ??
        attrs['role_attr'] ??
        (adminValue === '1' ? '行政身分' : '教師身分')
      ).trim();

      const indegree = Number(
        titleMap['indegree'] ?? attrs['indeg_attr'] ?? attrs['indegree'] ?? 0
      ) || 0;

      const outdegree = Number(
        titleMap['outdegree'] ?? attrs['outdeg_attr'] ?? attrs['outdegree'] ?? 0
      ) || 0;

      let x = Number(posEl ? posEl.getAttribute('x') : 0) || 0;
      let y = Number(posEl ? posEl.getAttribute('y') : 0) || 0;
      y = -y;

      let color = adminValue === '1' ? COLORS.admin : COLORS.teacher;
      if (colorEl) {
        const r = Number(colorEl.getAttribute('r'));
        const g = Number(colorEl.getAttribute('g'));
        const b = Number(colorEl.getAttribute('b'));
        if ([r,g,b].every(v => !Number.isNaN(v))) color = `rgb(${r},${g},${b})`;
      }

      nodes.push({
        id: nodeEl.getAttribute('id'),
        label: nodeEl.getAttribute('label') || nodeEl.getAttribute('id'),
        adminValue,
        role,
        group: adminValue === '1' ? 'admin' : 'teacher',
        indegree,
        outdegree,
        color,
        radius: 12,
        x, y,
        baseX: x,
        baseY: y
      });
    });

    const edges = [];
    xml.querySelectorAll('graph > edges > edge').forEach((edgeEl, idx) => {
      edges.push({
        id: edgeEl.getAttribute('id') || ('e' + idx),
        source: edgeEl.getAttribute('source'),
        target: edgeEl.getAttribute('target'),
        weight: Number(edgeEl.getAttribute('weight') || 1) || 1
      });
    });

    return { nodes, edges };
  }

  function buildMaps() {
    nodeMap = new Map();
    adjacency = new Map();
    graph.nodes.forEach(n => {
      nodeMap.set(n.id, n);
      adjacency.set(n.id, { in: new Set(), out: new Set(), all: new Set() });
    });
    graph.edges.forEach(e => {
      const s = adjacency.get(e.source);
      const t = adjacency.get(e.target);
      if (s && t) {
        s.out.add(e.target);
        s.all.add(e.target);
        t.in.add(e.source);
        t.all.add(e.source);
      }
    });
  }

  function applyVisualRules() {
    const indegrees = graph.nodes.map(n => n.indegree);
    const minIn = Math.min.apply(null, indegrees);
    const maxIn = Math.max.apply(null, indegrees);
    graph.nodes.forEach(n => {
      const t = maxIn === minIn ? 0.5 : (n.indegree - minIn) / (maxIn - minIn);
      n.radius = 10 + t * 18;
      n.color = n.group === 'admin' ? COLORS.admin : COLORS.teacher;
    });
  }

  function updateBounds() {
    if (!graph.nodes.length) return;
    const pad = 60;
    worldBounds.minX = Math.min.apply(null, graph.nodes.map(n => n.x - n.radius)) - pad;
    worldBounds.maxX = Math.max.apply(null, graph.nodes.map(n => n.x + n.radius)) + pad;
    worldBounds.minY = Math.min.apply(null, graph.nodes.map(n => n.y - n.radius)) - pad;
    worldBounds.maxY = Math.max.apply(null, graph.nodes.map(n => n.y + n.radius)) + pad;
  }

  function sortByLabel(a, b) {
    return String(a.label).localeCompare(String(b.label), 'zh-Hant');
  }

  function layoutParallel() {
    const teachers = graph.nodes.filter(n => n.group === 'teacher').sort(sortByLabel);
    const admins = graph.nodes.filter(n => n.group === 'admin').sort(sortByLabel);
    const gap = 68;
    const leftX = -240;
    const rightX = 240;
    const placeColumn = (list, x) => {
      const startY = -((list.length - 1) * gap) / 2;
      list.forEach((n, i) => {
        n.x = x;
        n.y = startY + i * gap;
      });
    };
    placeColumn(teachers, leftX);
    placeColumn(admins, rightX);
    updateBounds();
  }

  function layoutCircle() {
    const nodes = graph.nodes.slice().sort((a, b) => {
      if (a.group !== b.group) return a.group === 'teacher' ? -1 : 1;
      return sortByLabel(a, b);
    });
    const radius = Math.max(240, nodes.length * 15);
    nodes.forEach((n, i) => {
      const angle = (-Math.PI / 2) + (Math.PI * 2 * i / nodes.length);
      n.x = Math.cos(angle) * radius;
      n.y = Math.sin(angle) * radius;
    });
    updateBounds();
  }

  function normalizeCurrentLayout(scaleTo) {
    scaleTo = scaleTo || 560;
    const xs = graph.nodes.map(n => n.x);
    const ys = graph.nodes.map(n => n.y);
    const minX = Math.min.apply(null, xs);
    const maxX = Math.max.apply(null, xs);
    const minY = Math.min.apply(null, ys);
    const maxY = Math.max.apply(null, ys);
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const span = Math.max(maxX - minX, maxY - minY, 1);
    const factor = scaleTo / span;
    graph.nodes.forEach(n => {
      n.x = (n.x - cx) * factor;
      n.y = (n.y - cy) * factor;
    });
    updateBounds();
  }

  function layoutFR() {
    layoutCircle();
    const nodes = graph.nodes;
    const edges = graph.edges;
    const area = 900 * 900;
    const k = Math.sqrt(area / Math.max(nodes.length, 1));
    let temperature = 90;

    for (let iter = 0; iter < 260; iter++) {
      nodes.forEach(n => { n.dx = 0; n.dy = 0; });

      for (let i = 0; i < nodes.length; i++) {
        const v = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const u = nodes[j];
          let dx = v.x - u.x;
          let dy = v.y - u.y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
          const force = (k * k) / dist;
          const fx = dx / dist * force;
          const fy = dy / dist * force;
          v.dx += fx; v.dy += fy;
          u.dx -= fx; u.dy -= fy;
        }
      }

      edges.forEach(e => {
        const s = nodeMap.get(e.source);
        const t = nodeMap.get(e.target);
        if (!s || !t) return;
        let dx = s.x - t.x;
        let dy = s.y - t.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const force = (dist * dist) / k;
        const fx = dx / dist * force;
        const fy = dy / dist * force;
        s.dx -= fx; s.dy -= fy;
        t.dx += fx; t.dy += fy;
      });

      nodes.forEach(n => {
        const disp = Math.sqrt(n.dx * n.dx + n.dy * n.dy) || 0.01;
        const limited = Math.min(disp, temperature);
        n.x += (n.dx / disp) * limited;
        n.y += (n.dy / disp) * limited;
      });

      temperature *= 0.965;
    }
    normalizeCurrentLayout(620);
  }

  function bfsDistances() {
    const ids = graph.nodes.map(n => n.id);
    const index = new Map(ids.map((id, i) => [id, i]));
    const n = ids.length;
    const dist = Array.from({ length: n }, () => Array(n).fill(Infinity));
    ids.forEach((id, i) => {
      dist[i][i] = 0;
      const q = [id];
      const seen = new Set([id]);
      while (q.length) {
        const cur = q.shift();
        const curI = index.get(cur);
        adjacency.get(cur).all.forEach(next => {
          if (!seen.has(next)) {
            seen.add(next);
            dist[i][index.get(next)] = dist[i][curI] + 1;
            q.push(next);
          }
        });
      }
    });
    return { ids, index, dist };
  }

  function layoutKK() {
    layoutCircle();
    const { ids, dist } = bfsDistances();
    const n = ids.length;
    const L0 = 110;
    const K = 1;
    const springLength = Array.from({ length: n }, () => Array(n).fill(0));
    const springStrength = Array.from({ length: n }, () => Array(n).fill(0));

    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const dij = Number.isFinite(dist[i][j]) ? Math.max(dist[i][j], 1) : n;
        springLength[i][j] = L0 * dij;
        springStrength[i][j] = K / (dij * dij);
      }
    }

    function calcDelta(idx) {
      const node = graph.nodes[idx];
      let ex = 0, ey = 0;
      for (let j = 0; j < n; j++) {
        if (j === idx) continue;
        const other = graph.nodes[j];
        const dx = node.x - other.x;
        const dy = node.y - other.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const kij = springStrength[idx][j];
        const lij = springLength[idx][j];
        ex += kij * (dx - (lij * dx / d));
        ey += kij * (dy - (lij * dy / d));
      }
      return Math.sqrt(ex * ex + ey * ey);
    }

    function optimizeNode(idx) {
      for (let step = 0; step < 30; step++) {
        let Ex = 0, Ey = 0, Exx = 0, Eyy = 0, Exy = 0;
        const node = graph.nodes[idx];
        for (let j = 0; j < n; j++) {
          if (j === idx) continue;
          const other = graph.nodes[j];
          const dx = node.x - other.x;
          const dy = node.y - other.y;
          const d2 = dx * dx + dy * dy || 0.0001;
          const d = Math.sqrt(d2);
          const kij = springStrength[idx][j];
          const lij = springLength[idx][j];

          Ex += kij * (dx - lij * dx / d);
          Ey += kij * (dy - lij * dy / d);
          Exx += kij * (1 - lij * (dy * dy) / (d2 * d));
          Eyy += kij * (1 - lij * (dx * dx) / (d2 * d));
          Exy += kij * (lij * dx * dy / (d2 * d));
        }

        const det = Exx * Eyy - Exy * Exy;
        if (Math.abs(det) < 1e-9) break;
        const deltaX = (-Eyy * Ex + Exy * Ey) / det;
        const deltaY = (Exy * Ex - Exx * Ey) / det;

        node.x += deltaX;
        node.y += deltaY;

        if (Math.sqrt(deltaX * deltaX + deltaY * deltaY) < 0.1) break;
      }
    }

    for (let iter = 0; iter < 180; iter++) {
      let maxDelta = -1;
      let maxIdx = 0;
      for (let i = 0; i < n; i++) {
        const d = calcDelta(i);
        if (d > maxDelta) { maxDelta = d; maxIdx = i; }
      }
      if (maxDelta < 0.5) break;
      optimizeNode(maxIdx);
    }

    normalizeCurrentLayout(620);
  }

  function applyLayout(mode, announce) {
    if (!graph.nodes.length) return;
    if (mode === 'parallel') layoutParallel();
    else if (mode === 'circle') layoutCircle();
    else if (mode === 'fr') layoutFR();
    else if (mode === 'kk') layoutKK();
    resetView(mode === 'parallel' ? 0.78 : 0.84);
    if (announce) {
      const label = layoutMode.options[layoutMode.selectedIndex].textContent;
      setStatus('已切換為' + label, false);
    }
  }

  function isConnected(a, b) {
    const rel = adjacency.get(a.id);
    return !!rel && rel.all.has(b.id);
  }

  function edgeIsConnectedToHover(e) {
    if (!hoverNode) return false;
    return e.source === hoverNode.id || e.target === hoverNode.id;
  }

  function drawArrow(x1, y1, x2, y2, size, color, alphaScale) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.save();
    ctx.globalAlpha = alphaScale;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - Math.cos(angle - Math.PI / 7) * size, y2 - Math.sin(angle - Math.PI / 7) * size);
    ctx.lineTo(x2 - Math.cos(angle + Math.PI / 7) * size, y2 - Math.sin(angle + Math.PI / 7) * size);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function draw() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.clearRect(0, 0, w, h);

    graph.edges.forEach(e => {
      const s = nodeMap.get(e.source);
      const t = nodeMap.get(e.target);
      if (!s || !t) return;
      const sp = worldToScreen(s.x, s.y);
      const tp = worldToScreen(t.x, t.y);

      const dx = tp.x - sp.x;
      const dy = tp.y - sp.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / dist;
      const uy = dy / dist;

      const startX = sp.x + ux * (s.radius * camera.scale * 0.9);
      const startY = sp.y + uy * (s.radius * camera.scale * 0.9);
      const endX = tp.x - ux * (t.radius * camera.scale * 1.05);
      const endY = tp.y - uy * (t.radius * camera.scale * 1.05);

      const connected = edgeIsConnectedToHover(e);
      const faded = hoverNode && toggleFocus.checked && !connected;
      ctx.save();
      ctx.strokeStyle = faded ? COLORS.edgeFade : COLORS.edge;
      ctx.globalAlpha = faded ? 0.35 : 0.9;
      ctx.lineWidth = connected ? 2.3 : 1.2;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      ctx.restore();

      if (toggleArrows.checked) {
        drawArrow(startX, startY, endX, endY, connected ? 10 : 8, COLORS.edge, faded ? 0.35 : 0.9);
      }
    });

    graph.nodes.forEach(n => {
      const p = worldToScreen(n.x, n.y);
      const r = n.radius * camera.scale;
      const connected = hoverNode ? (hoverNode.id === n.id || isConnected(hoverNode, n)) : false;
      const faded = hoverNode && toggleFocus.checked && !connected;
      ctx.save();
      ctx.globalAlpha = faded ? 0.28 : 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.color;
      ctx.fill();
      ctx.lineWidth = hoverNode && hoverNode.id === n.id ? 3.2 : 1.6;
      ctx.strokeStyle = COLORS.nodeStroke;
      ctx.stroke();
      ctx.restore();

      if (toggleLabels.checked) {
        ctx.save();
        ctx.globalAlpha = faded ? 0.28 : 1;
        ctx.font = `700 ${Math.max(11, Math.min(16, r * 0.72))}px Noto Sans TC, Microsoft JhengHei, sans-serif`;
        ctx.fillStyle = COLORS.label;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.label, p.x, p.y);
        ctx.restore();
      }
    });
  }

  function findNodeAt(sx, sy) {
    for (let i = graph.nodes.length - 1; i >= 0; i--) {
      const n = graph.nodes[i];
      const p = worldToScreen(n.x, n.y);
      const r = n.radius * camera.scale;
      const dx = sx - p.x;
      const dy = sy - p.y;
      if (dx * dx + dy * dy <= r * r) return n;
    }
    return null;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[s]));
  }

  function showTooltip(node, sx, sy) {
    const rel = adjacency.get(node.id) || { in:new Set(), out:new Set(), all:new Set() };
    const inList = Array.from(rel.in).sort((a,b) => String(a).localeCompare(String(b),'zh-Hant'));
    const outList = Array.from(rel.out).sort((a,b) => String(a).localeCompare(String(b),'zh-Hant'));
    let html = '<div class="title">' + escapeHtml(node.label) + '</div>';
    html += '<div class="meta">' + escapeHtml(node.role) + '</div>';
    html += '<div><strong>Indegree：</strong>' + node.indegree + '</div>';
    html += '<div><strong>Outdegree：</strong>' + node.outdegree + '</div>';
    html += '<div><strong>連結總數：</strong>' + rel.all.size + '</div>';
    if (inList.length) {
      html += '<div class="list"><strong>指向此節點：</strong><ul>';
      inList.forEach(id => { html += '<li>' + escapeHtml(id) + '</li>'; });
      html += '</ul></div>';
    }
    if (outList.length) {
      html += '<div class="list"><strong>此節點指向：</strong><ul>';
      outList.forEach(id => { html += '<li>' + escapeHtml(id) + '</li>'; });
      html += '</ul></div>';
    }
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    const maxLeft = canvas.clientWidth - tooltip.offsetWidth - 16;
    const maxTop = canvas.clientHeight - tooltip.offsetHeight - 16;
    tooltip.style.left = Math.max(16, Math.min(sx + 14, maxLeft)) + 'px';
    tooltip.style.top = Math.max(16, Math.min(sy + 14, maxTop)) + 'px';
  }

  function hideTooltip() {
    tooltip.style.display = 'none';
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    dragNode = findNodeAt(sx, sy);
    isPanning = !dragNode;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
    canvas.classList.add('dragging');
  });

  window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    if (dragNode) {
      const w = screenToWorld(sx, sy);
      dragNode.x = w.x;
      dragNode.y = w.y;
      updateBounds();
      draw();
      showTooltip(dragNode, sx, sy);
      return;
    }

    if (isPanning) {
      const dx = e.clientX - lastMouse.x;
      const dy = e.clientY - lastMouse.y;
      camera.x -= dx / camera.scale;
      camera.y -= dy / camera.scale;
      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
      draw();
      return;
    }

    const n = findNodeAt(sx, sy);
    if (n !== hoverNode) {
      hoverNode = n;
      if (hoverNode) showTooltip(hoverNode, sx, sy);
      else hideTooltip();
      draw();
    } else if (hoverNode) {
      showTooltip(hoverNode, sx, sy);
    }
  });

  window.addEventListener('mouseup', () => {
    dragNode = null;
    isPanning = false;
    canvas.classList.remove('dragging');
  });

  canvas.addEventListener('mouseleave', () => {
    if (!dragNode && !isPanning) {
      hoverNode = null;
      hideTooltip();
      draw();
    }
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const before = screenToWorld(sx, sy);
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    camera.scale = Math.max(0.18, Math.min(4.8, camera.scale * factor));
    const after = screenToWorld(sx, sy);
    camera.x += before.x - after.x;
    camera.y += before.y - after.y;
    draw();
  }, { passive:false });

  [toggleLabels, toggleArrows, toggleFocus].forEach(el => {
    el.addEventListener('change', draw);
  });

  layoutMode.addEventListener('change', () => applyLayout(layoutMode.value, true));
  rerunBtn.addEventListener('click', () => applyLayout(layoutMode.value, true));
  resetViewBtn.addEventListener('click', () => resetView(layoutMode.value === 'parallel' ? 0.78 : 0.84));
  window.addEventListener('resize', resizeCanvas);

  function loadGraph() {
    fetch(GEXF_FILE + '?_=' + Date.now())
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(text => {
        graph = parseGexf(text);
        buildMaps();
        applyVisualRules();
        applyLayout('parallel', false);
        layoutMode.value = 'parallel';
        resizeCanvas();
        setStatus('network2.gexf載入完成', false);
      })
      .catch(err => {
        statusBox.style.display = 'block';
        statusBox.innerHTML = '讀取network2.gexf失敗。請確認HTML與network2.gexf放在同一資料夾，且使用HTTP伺服器或GitHub Pages開啟。<br>錯誤：' + escapeHtml(String(err));
      });
  }

  resizeCanvas();
  loadGraph();
})();
</script>
</body>
</html>
